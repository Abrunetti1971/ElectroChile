name: electrochile_pro
description: ElectroChile PRO - Hecho por instaladores para instaladores.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Base de datos
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # PDF
  pdf: ^3.11.3
  printing: ^5.14.2

  # Compartir
  share_plus: ^11.1.0

  # QR
  qr_flutter: ^4.1.0

  # Selector de archivos
  file_picker: ^10.3.2

  # Fechas
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/